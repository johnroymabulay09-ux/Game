<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Shooter</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #101b3f, #02030a 70%);
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  h1 {
    margin: 15px 0 5px;
    color: cyan;
    text-shadow: 0 0 15px cyan;
  }

  #hud {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 10px;
    font-size: 16px;
  }

  #game {
    position: relative;
    width: 100%;
    max-width: 360px;
    height: 520px;
    margin: auto;
    border: 2px solid cyan;
    overflow: hidden;
    background:
      linear-gradient(rgba(0,255,255,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.08) 1px, transparent 1px),
      #030712;
    background-size: 30px 30px;
    box-shadow: 0 0 25px cyan;
  }

  .player {
    position: absolute;
    width: 28px;
    height: 28px;
    background: cyan;
    bottom: 15px;
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    box-shadow: 0 0 15px cyan;
  }

  .enemy {
    position: absolute;
    width: 24px;
    height: 24px;
    background: hotpink;
    border-radius: 50%;
    box-shadow: 0 0 15px hotpink;
  }

  .bullet {
    position: absolute;
    width: 6px;
    height: 16px;
    background: yellow;
    border-radius: 5px;
    box-shadow: 0 0 12px yellow;
  }

  #message {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(0,0,0,0.65);
    font-size: 24px;
    font-weight: bold;
    color: cyan;
    text-shadow: 0 0 15px cyan;
    z-index: 10;
  }

  button {
    margin: 8px 4px;
    padding: 10px 18px;
    background: transparent;
    color: cyan;
    border: 1px solid cyan;
    cursor: pointer;
    box-shadow: 0 0 10px cyan;
  }

  button:hover {
    background: cyan;
    color: black;
  }
</style>
</head>

<body>

<h1>🚀 Neon Shooter</h1>

<div id="hud">
  <span id="score">Score: 0</span>
  <span id="lives">Lives: 3</span>
  <span id="level">Level: 1</span>
</div>

<div id="game">
  <div id="player" class="player"></div>
  <div id="message">Press Start</div>
</div>

<div>
  <button onclick="moveLeft()">⬅️ Left</button>
  <button onclick="shoot()">🔥 Shoot</button>
  <button onclick="moveRight()">Right ➡️</button>
  <button onclick="startGame()">Start / Restart</button>
</div>

<script>
const game = document.getElementById("game");
const player = document.getElementById("player");
const scoreText = document.getElementById("score");
const livesText = document.getElementById("lives");
const levelText = document.getElementById("level");
const message = document.getElementById("message");

let playerX = 166;
let bullets = [];
let enemies = [];
let score = 0;
let lives = 3;
let level = 1;
let gameRunning = false;

let keys = {};
let lastShot = 0;
let spawnTimer;

const gameWidth = 360;
const playerWidth = 28;

function updateHUD() {
  scoreText.textContent = "Score: " + score;
  livesText.textContent = "Lives: " + lives;
  levelText.textContent = "Level: " + level;
}

function updatePlayer() {
  player.style.left = playerX + "px";
}

function moveLeft() {
  playerX -= 20;
  if (playerX < 0) playerX = 0;
  updatePlayer();
}

function moveRight() {
  playerX += 20;
  if (playerX > gameWidth - playerWidth) {
    playerX = gameWidth - playerWidth;
  }
  updatePlayer();
}

function shoot() {
  if (!gameRunning) return;

  const now = Date.now();
  if (now - lastShot < 250) return;

  bullets.push({
    x: playerX + 11,
    y: 465
  });

  lastShot = now;
}

function spawnEnemy() {
  if (!gameRunning) return;

  enemies.push({
    x: Math.random() * (gameWidth - 24),
    y: -25,
    speed: 1.5 + level * 0.4
  });
}

function startGame() {
  bullets = [];
  enemies = [];
  score = 0;
  lives = 3;
  level = 1;
  playerX = 166;
  gameRunning = true;

  message.style.display = "none";
  updateHUD();
  updatePlayer();

  clearInterval(spawnTimer);
  spawnTimer = setInterval(spawnEnemy, 900);
}

function endGame() {
  gameRunning = false;
  clearInterval(spawnTimer);
  message.innerHTML = `Game Over<br>Score: ${score}<br><small>Press Start</small>`;
  message.style.display = "grid";
}

function createElement(className, x, y) {
  const el = document.createElement("div");
  el.className = className;
  el.style.left = x + "px";
  el.style.top = y + "px";
  game.appendChild(el);
}

function collision(a, b, size = 22) {
  return Math.abs(a.x - b.x) < size && Math.abs(a.y - b.y) < size;
}

function loop() {
  if (!gameRunning) {
    requestAnimationFrame(loop);
    return;
  }

  document.querySelectorAll(".bullet, .enemy").forEach(el => el.remove());

  if (keys["ArrowLeft"]) moveLeft();
  if (keys["ArrowRight"]) moveRight();
  if (keys[" "]) shoot();

  bullets = bullets.filter(b => b.y > -20);
  enemies = enemies.filter(e => e.y < 540);

  bullets.forEach(b => {
    b.y -= 7;
    createElement("bullet", b.x, b.y);
  });

  enemies.forEach((e, ei) => {
    e.y += e.speed;
    createElement("enemy", e.x, e.y);

    bullets.forEach((b, bi) => {
      if (collision(e, b)) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score += 10;

        if (score % 100 === 0) {
          level++;
        }

        updateHUD();
      }
    });

    if (e.y > 470 && Math.abs(e.x - playerX) < 30) {
      enemies.splice(ei, 1);
      lives--;
      updateHUD();

      if (lives <= 0) {
        endGame();
      }
    }
  });

  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  keys[e.key] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key] = false;
});

document.addEventListener("touchstart", e => {
  const x = e.touches[0].clientX;

  if (x < window.innerWidth / 3) moveLeft();
  else if (x > window.innerWidth * 2 / 3) moveRight();
  else shoot();
});

updatePlayer();
updateHUD();
loop();
</script>

</body>
</html>
